<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مولد حلقات أنمي كونان - Aoibu V3 (New Design)</title>
    <link href="https://fonts.googleapis.com/css2?family=El+Messiri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'El Messiri', sans-serif;
            background: #0f1016;
            color: #fff;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            background: rgba(30, 32, 40, 0.8);
            padding: 30px;
            border-radius: 15px;
            border: 1px solid #00bcd4;
            width: 100%;
            max-width: 800px;
            box-shadow: 0 0 20px rgba(0, 188, 212, 0.2);
        }
        h2 { text-align: center; color: #00bcd4; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #ccc; }
        input, select {
            width: 100%;
            padding: 10px;
            background: #0a0b10;
            border: 1px solid #333;
            color: #fff;
            border-radius: 5px;
            font-family: sans-serif;
            box-sizing: border-box;
        }
        input:focus, textarea:focus { outline: none; border-color: #00bcd4; }
        
        .desc-input {
            width: 100%;
            height: 100px;
            background: #0a0b10;
            color: #fff;
            border: 1px solid #333;
            padding: 10px;
            border-radius: 5px;
            font-family: 'El Messiri', sans-serif;
            resize: vertical;
        }

        .file-upload-wrapper {
            position: relative;
            border: 2px dashed #444;
            padding: 20px;
            text-align: center;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }
        .file-upload-wrapper:hover { border-color: #00bcd4; background: rgba(0, 188, 212, 0.05); }
        .upload-status { font-size: 14px; margin-top: 10px; font-weight: bold; }
        
        button {
            width: 100%;
            padding: 15px;
            background: #00bcd4;
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }
        button:hover { background: #008ba3; }
        button:disabled { background: #555; cursor: not-allowed; }

        #outputCode {
            width: 100%;
            height: 300px;
            background: #050505;
            color: #00ff9d;
            border: 1px solid #333;
            margin-top: 20px;
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            direction: ltr;
        }
        .note { font-size: 12px; color: #777; margin-top: 5px; }
        .preview-img { max-width: 100px; max-height: 140px; margin-top: 10px; border-radius: 5px; display: none; border: 1px solid #fff; }
    </style>
</head>
<body>

<div class="container">
    <h2>🛠️ مولد حلقات Aoibu (التصميم الجديد)</h2>

    <div style="display: flex; gap: 10px;">
        <div class="form-group" style="flex: 1;">
            <label>رقم الحلقة:</label>
            <input type="text" id="epNum" placeholder="1191">
        </div>
        <div class="form-group" style="flex: 1;">
            <label>نوع الحلقة:</label>
            <select id="epType">
                <option value="filler">فلر (Filler)</option>
                <option value="manga">مانجا (Manga)</option>
                <option value="remaster">معاد إنتاجها (Remaster)</option>
                <option value="special">خاصة (Special)</option>
            </select>
        </div>
    </div>

    <div class="form-group">
        <label>عنوان الحلقة (اسم القصة):</label>
        <input type="text" id="epTitle" placeholder="مثال: الحبيب الذي اختفى...">
    </div>

    <div class="form-group">
        <label>قصة / وصف الحلقة:</label>
        <textarea id="epDesc" class="desc-input" placeholder="اكتب هنا قصة الحلقة أو وصفها المختصر..."></textarea>
    </div>

    <div class="form-group">
        <label>البوستر (ارفع الصورة وسيتولى الموقع استضافتها):</label>
        <div class="file-upload-wrapper" onclick="document.getElementById('posterFile').click()">
            <span id="uploadText">📂 اضغط لاختيار صورة البوستر</span>
            <input type="file" id="posterFile" accept="image/*" style="display: none;" onchange="handleImageUpload(this)">
        </div>
        <img id="imgPreview" class="preview-img" src="">
        <div id="uploadStatus" class="upload-status" style="color: #ff9800;"></div>
        <input type="hidden" id="finalPosterUrl">
    </div>

    <div class="form-group">
        <label>رابط Google Drive:</label>
        <input type="text" id="driveLink" placeholder="رابط الملف أو المشاهدة">
    </div>

    <div class="form-group">
        <label>رابط Mega:</label>
        <input type="text" id="megaLink" placeholder="رابط الملف أو Embed">
    </div>

    <div class="form-group">
        <label>رابط TokyoInsider (اختياري للمشاهدة والتحميل):</label>
        <input type="text" id="tokyoLink" placeholder="رابط المشاهدة المباشر MP4">
    </div>

    <div class="form-group">
        <label>روابط إضافية (اختياري):</label>
        <input type="text" id="rawLink" placeholder="رابط الخام (MP4)" style="margin-bottom: 5px;">
        <input type="text" id="subLink" placeholder="رابط ملف الترجمة (ASS)">
    </div>

    <button id="generateBtn" onclick="generateHTML()">⚡ توليد الكود الجديد</button>

    <textarea id="outputCode" placeholder="سيظهر الكود هنا..."></textarea>
    <button onclick="copyCode()" style="background: #333; color: #fff; margin-top: 10px;">📋 نسخ الكود</button>
</div>

<script>
    const IMGBB_API_KEY = "1a3381c886abff3277bc11ab4fbefedf"; 

    function handleImageUpload(input) {
        if (input.files && input.files[0]) {
            const file = input.files[0];
            const statusDiv = document.getElementById('uploadStatus');
            const preview = document.getElementById('imgPreview');
            const genBtn = document.getElementById('generateBtn');

            const reader = new FileReader();
            reader.onload = function(e) {
                preview.src = e.target.result;
                preview.style.display = 'block';
            }
            reader.readAsDataURL(file);

            statusDiv.innerText = "جاري رفع الصورة للسيرفر وتوليد رابط دائم... ⏳";
            statusDiv.style.color = "#ff9800";
            genBtn.disabled = true; 

            const formData = new FormData();
            formData.append("image", file);

            fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                method: "POST",
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    document.getElementById('finalPosterUrl').value = data.data.url;
                    statusDiv.innerText = "✅ تم الرفع بنجاح! الرابط جاهز.";
                    statusDiv.style.color = "#00ff9d";
                    document.getElementById('uploadText').innerText = "تم اختيار: " + file.name;
                } else {
                    throw new Error("فشل الرفع");
                }
            })
            .catch(error => {
                console.error(error);
                statusDiv.innerText = "❌ حدث خطأ في الرفع. تأكد من الإنترنت أو جرب صورة أصغر.";
                statusDiv.style.color = "red";
            })
            .finally(() => {
                genBtn.disabled = false;
            });
        }
    }

    function generateHTML() {
        let ep = document.getElementById('epNum').value.trim();
        let title = document.getElementById('epTitle').value.trim();
        let desc = document.getElementById('epDesc').value.trim();
        let poster = document.getElementById('finalPosterUrl').value.trim();
        let epType = document.getElementById('epType').value;
        
        let driveInput = document.getElementById('driveLink').value.trim();
        let megaInput = document.getElementById('megaLink').value.trim();
        let tokyoInput = document.getElementById('tokyoLink').value.trim();
        let rawLink = document.getElementById('rawLink').value.trim();
        let subLink = document.getElementById('subLink').value.trim();

        if (!ep) ep = "{EP}"; 
        if (!desc) desc = "لا يوجد وصف متاح لهذه الحلقة حالياً.";

        if (!poster) {
            alert("⚠️ المرجو رفع صورة البوستر أولاً أو الانتظار حتى يكتمل الرفع.");
            return;
        }

        let badgeHTML = "";
        if(epType === "filler") {
            badgeHTML = `<span class="badge filler">فلر</span>`;
        } else if (epType === "manga") {
            badgeHTML = `<span class="badge manga">مانجا</span>`;
        } else if (epType === "remaster") {
            badgeHTML = `<span class="badge filler">Remaster</span>`; 
        }

        let driveEmbed = "";
        let driveDL = "";
        let driveIdMatch = driveInput.match(/\/d\/([a-zA-Z0-9_-]+)/);
        if (driveIdMatch && driveIdMatch[1]) {
            let id = driveIdMatch[1];
            driveEmbed = `https://drive.google.com/file/d/${id}/preview`;
            driveDL = `https://drive.google.com/file/d/${id}/view?usp=drivesdk`;
        } else {
            driveEmbed = driveInput || "#";
            driveDL = driveInput || "#";
        }

        let megaEmbed = "";
        let megaDL = "";
        if (megaInput.includes("mega.nz/file/")) {
            megaDL = megaInput;
            megaEmbed = megaInput.replace("/file/", "/embed/");
        } else if (megaInput.includes("mega.nz/embed/")) {
            megaEmbed = megaInput;
            megaDL = megaInput.replace("/embed/", "/file/");
        } else {
            megaEmbed = megaInput || "#";
            megaDL = megaInput || "#";
        }

        // معالجة رابط سيرفر طوكيو (زر المشاهدة + صف التحميل)
        let tokyoBtnHTML = "";
        let tokyoDLRow = "";
        if (tokyoInput !== "") {
            tokyoBtnHTML = `<button class="neon-btn" onclick="changeServer('${tokyoInput}', this)">TokyoInsider</button>`;
            tokyoDLRow = `<tr><td>TokyoInsider</td><td>1080p FHD</td><td><a href="${tokyoInput}" class="dl-link" target="_blank" download>تحميل</a></td></tr>`;
        }

        let template = `<!DOCTYPE html>

    <title>انمي المحقق كونان Detective Conan الحلقة ${ep} مترجمة</title>
    <link href="https://fonts.googleapis.com/css2?family=El+Messiri:wght@400;600;700&display=swap" rel="stylesheet">
  
    <meta http-equiv="X-UA-Compatible" content="IE=9; IE=8; IE=7; IE=edge,chrome=1" />
    <meta name="title" content="انمي المحقق كونان Detective Conan الحلقة ${ep} مترجمة" />
    <meta name="keywords" content="مشاهدة انمي المحقق كونان Detective Conan, انمي المحقق كونان Detective Conan, المحقق كونان Detective Conan, انمي المحقق كونان Detective Conan اويبو, المحقق كونان Detective Conan فريق اويبو للترجمة" />

      </button>

      ${tokyoBtnHTML} </div>

    <div style="overflow-x: auto;">

            <tr><th>السيرفر</th><th>الجودة</th><th>التحميل</th></tr>

        </a>

  </div>

  <div class="glass-card">
